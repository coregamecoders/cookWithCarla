<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cookWithCarla</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header>
  <h1>🍳 cookWithCarla</h1>
  <p>Simple recipes. Clean cooking. No clutter.</p>
</header>

<!-- RECIPE CARDS -->
<section class="recipes">

  <div class="card" onclick="openRecipe('pasta')">
    <h2>Pasta Alfredo</h2>
    <p>Creamy garlic pasta in 20 minutes.</p>
  </div>

  <div class="card" onclick="openRecipe('chicken')">
    <h2>Chicken Rice Bowl</h2>
    <p>Healthy protein-packed meal.</p>
  </div>

  <div class="card" onclick="openRecipe('cake')">
    <h2>Chocolate Cake</h2>
    <p>Soft, rich homemade dessert.</p>
  </div>

  <div class="card" onclick="openRecipe('toast')">
    <h2>Avocado Toast</h2>
    <p>Quick and healthy breakfast.</p>
  </div>

</section>

<!-- FULL RECIPE VIEW (hidden by default) -->
<section id="recipeDetail" class="hidden"></section>

<script src="script.js"></script>

</body>
</html>
